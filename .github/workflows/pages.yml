name: Deploy Castform to GitHub Pages

# Build the self-contained standalone app and publish it to GitHub Pages.
# This workflow ENABLES Pages on first run (configure-pages enablement: true),
# so no manual repo-settings step is required.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build standalone app
        run: python build_standalone.py

      - name: Generate PWA icons
        run: python make_icons.py

      - name: Assemble site (standalone -> index.html + PWA assets)
        run: |
          mkdir -p _site
          cp standalone.html _site/index.html
          cp standalone.html _site/standalone.html
          cp public/manifest.json _site/manifest.json
          cp public/sw.js _site/sw.js
          cp public/icon-192.png public/icon-512.png public/icon-maskable-512.png public/apple-touch-icon.png _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
