   Gauge console (WeeWX-inspired, modernized)
   ============================================================ */
.gauge { width: 100%; max-width: 138px; height: auto; display: block; margin: 0 auto; overflow: visible; }
.gauge-val { font-size: 30px; font-weight: 800; fill: var(--text); }
.gauge-unit { font-size: 13px; font-weight: 600; fill: var(--muted); }
.gauge-sub { font-size: 12px; fill: var(--muted); }
.gauge-label { font-size: 12px; fill: var(--faint); text-transform: uppercase; letter-spacing: 0.6px; }
.gauge-arc { animation: gaugeFill 1.2s cubic-bezier(.2,.7,.2,1) forwards; }
@keyframes gaugeFill { from { stroke-dashoffset: 100; } to { stroke-dashoffset: var(--target, 100); } }
.gauge-thumb { opacity: 0; animation: thumbIn 0.4s ease 0.9s forwards; }
@keyframes thumbIn { to { opacity: 1; } }
.compass-tick { font-size: 11px; fill: var(--muted); font-weight: 700; }
.compass-needle { transition: transform 1s cubic-bezier(.2,.7,.2,1); }
/* Conditions card stretches to match the hero; gauges center in the space */
#content > .cond-card { align-self: stretch; display: flex; flex-direction: column; }
.cond-card #tiles { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.cond-card .gauge-grid { flex: 1; align-content: center; }
.gauge-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(168px, 1fr)); gap: 4px 8px; }
.gauge-cell { display: flex; flex-direction: column; align-items: center; padding: 6px 4px; border-radius: 16px; transition: background .2s; }
.gauge-cell:hover { background: var(--panel-2); }
.gauge-cap { font-size: 12px; color: var(--faint); text-transform: uppercase; letter-spacing: 0.6px; margin-top: -6px; }
/* Hero: big temperature gauge, horizontal layout */
.current { display: flex; flex-direction: column; }
.cur-main { flex: 1 1 auto; display: flex; align-items: center; justify-content: center; gap: 22px; flex-wrap: wrap; margin: 4px 0; }
/* Today summary pinned to the bottom of the hero — fills the dead space */
.hero-today { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px;
  padding-top: 14px; border-top: 1px solid var(--stroke); }
.hero-today .ht { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.hero-today .htk { font-size: 0.7rem; color: var(--faint); }
.hero-today .htv { font-size: 1.05rem; font-weight: 700; }
.hero-gauge { display: flex; justify-content: center; flex: 0 0 auto; }
.hero-gauge .gauge { max-width: 196px; }
.cur-info { display: flex; flex-direction: column; gap: 8px; min-width: 180px; }
.hero-cond { display: flex; align-items: center; gap: 14px; }
.hero-cond .hero-ico .wxicon { width: 62px; height: 62px; }
.hero-cond .cond { font-size: 1.35rem; font-weight: 700; }
.hero-cond .feels { color: var(--muted); }
.current .hilo { font-size: 1.1rem; }
.current .place { font-size: 1.6rem; font-weight: 700; }
.current .place .sub { font-size: 0.95rem; color: var(--muted); font-weight: 500; }
/* Secondary stat strip */
.statstrip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px;
  padding-top: 12px; border-top: 1px solid var(--stroke); }
.statstrip .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.statstrip .sk { font-size: 0.68rem; color: var(--faint); text-transform: uppercase; letter-spacing: .5px; }
.statstrip .sv { font-size: 1.1rem; font-weight: 700; }
@media (max-width: 480px) { .statstrip { grid-template-columns: repeat(2, 1fr); } }
/* Icon-headed card titles */
.card h2 .h2-ico { margin-right: 7px; filter: saturate(1.2); }
/* Toolbar extras, favorites, comfort, marine, compare, effects ------------ */
.icon-btn { min-width: 42px; justify-content: center; font-size: 1.05rem; }
#starBtn.active { color: #ffd45e; border-color: rgba(255,212,94,0.5); }
/* Manual refresh button — spins its icon while a refresh is in flight */
.ref-ico { display: inline-block; line-height: 1; }
#refreshBtn.spinning { pointer-events: none; opacity: 0.85; }
#refreshBtn.spinning .ref-ico { animation: refspin 0.8s linear infinite; }
@keyframes refspin { to { transform: rotate(360deg); } }
.reduce-motion #refreshBtn.spinning .ref-ico { animation: none; }
/* While the geolocation prompt / fix is pending, dim the pin and block re-taps */
#geoBtn.locating { pointer-events: none; opacity: 0.5; }
#notifyBtn.active { color: #7ed957; border-color: rgba(126,217,87,0.45); }
.fav-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.fav-bar.hidden { display: none; }
.fav-chip { display: inline-flex; align-items: center; gap: 8px; padding: 7px 12px; border-radius: 11px;
  background: var(--glass); border: 1px solid var(--stroke); color: var(--text); cursor: pointer; font-size: 0.88rem;
  backdrop-filter: blur(10px); transition: background .15s; }
.fav-chip:hover { background: var(--glass-strong); }
.fav-chip.active { border-color: var(--accent); background: rgba(111,183,255,0.16); }
.fav-x { opacity: 0.5; font-size: 1.05rem; line-height: 1; }
.fav-x:hover { opacity: 1; color: #ff8a5f; }
.comfort { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-weight: 600; }
.comfort-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }
.comfort-sub { color: var(--muted); font-weight: 400; }
.sun-extra { display: flex; gap: 22px; width: 100%; justify-content: center; margin-top: 10px;
  padding-top: 14px; border-top: 1px solid var(--stroke); }
.sun-extra .k { font-size: 0.74rem; color: var(--faint); }
.sun-extra .v2 { font-size: 1rem; font-weight: 700; margin-top: 2px; }
.history-facts { font-size: 0.9rem; color: var(--muted); line-height: 1.6; margin-bottom: 14px;
  padding: 12px 14px; background: var(--panel-2); border-radius: 12px; border: 1px solid var(--stroke); }
.history-facts:empty { display: none; }
.history-facts b { color: var(--text); }
/* Compare */
.compare-search { flex: 0 1 320px; }
.compare-panel { display: flex; align-items: stretch; gap: 14px; margin-top: 16px; }
.compare-panel.hidden { display: none; }
.cmp-loading { color: var(--muted); padding: 14px; }
.cmp-col { position: relative; flex: 1; background: var(--panel-2); border: 1px solid var(--stroke);
  border-radius: 16px; padding: 16px; text-align: center; }
.cmp-vs { align-self: center; color: var(--faint); font-weight: 700; }
.cmp-name { font-weight: 700; font-size: 1.05rem; }
.cmp-row { display: flex; align-items: center; justify-content: center; gap: 8px; }
.cmp-row .wxicon { width: 56px; height: 56px; }
.cmp-temp { font-size: 2.6rem; font-weight: 700; }
.cmp-cond { color: var(--muted); margin-bottom: 8px; }
.cmp-stats { display: flex; flex-wrap: wrap; gap: 8px 14px; justify-content: center; font-size: 0.85rem; color: var(--muted); }
.cmp-close { position: absolute; top: 8px; right: 8px; padding: 4px 10px; }
/* Update toast */
.update-toast { position: fixed; bottom: calc(22px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(20,28,48,0.95); border: 1px solid var(--stroke); color: var(--text);
  padding: 10px 18px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; z-index: 900;
  opacity: 0; pointer-events: none; transition: opacity .4s, transform .4s; box-shadow: var(--shadow); }
.update-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
/* Cloud drift */
.cloud-fx { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0; transition: opacity 1.5s; overflow: hidden; }
.cloud-fx.on { opacity: 1; }
.cloud-fx span { position: absolute; left: 0; width: 200px; animation: clouddrift var(--dur, 90s) linear infinite; animation-delay: var(--delay, 0s); }
.cloud-fx svg { width: 100%; height: auto; }
@keyframes clouddrift { from { transform: translateX(-25vw) scale(var(--scale,1)); } to { transform: translateX(125vw) scale(var(--scale,1)); } }
/* Snow */
.snow-fx { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0; transition: opacity 1.2s; overflow: hidden; }
.snow-fx.on { opacity: 1; }
.snow-fx i { position: absolute; top: -5%; border-radius: 50%; background: #fff; opacity: 0.85;
  animation: snowfall2 var(--dur, 8s) linear infinite; animation-delay: var(--delay, 0s); }
@keyframes snowfall2 { to { transform: translateY(106vh) translateX(var(--drift, 0px)); } }
/* Lightning */
.lightning { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: #cfe0ff; opacity: 0; }
.lightning.flash { animation: lightningFlash 0.25s ease-out; }
@keyframes lightningFlash { 0% { opacity: 0; } 15% { opacity: 0.55; } 30% { opacity: 0.1; } 45% { opacity: 0.5; } 100% { opacity: 0; } }
/* Nowcast banner ---------------------------------------------------------- */
.nowcast {
  display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px;
  padding: 13px 18px; border-radius: 16px; font-size: 1rem; font-weight: 600;
  background: linear-gradient(100deg, rgba(95,168,255,0.22), rgba(95,168,255,0.06));
  border: 1px solid rgba(95,168,255,0.4); backdrop-filter: blur(12px);
  animation: fadeIn 0.5s ease both;
}
.nc-main { display: flex; align-items: center; gap: 12px; }
.nc-graph { display: flex; flex-direction: column; gap: 2px; }
.nc-graph svg { width: 100%; height: 48px; display: block; }
.nc-graph-x { display: flex; justify-content: space-between; font-size: 0.66rem;
  font-weight: 600; color: var(--faint); padding: 0 2px; }
.nowcast.dry { background: linear-gradient(100deg, rgba(126,217,87,0.16), rgba(126,217,87,0.04)); border-color: rgba(126,217,87,0.35); }
.nowcast.hidden { display: none; }
.nowcast .nc-icon { font-size: 1.5rem; line-height: 1; animation: bob 2s ease-in-out infinite; }
@keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
.nowcast .nc-sub { color: var(--muted); font-weight: 500; font-size: 0.88rem; }
/* Activity outlook banner — plain-language &quot;what should I do&quot; hint --------- */
.activity-hint {
  display: flex; align-items: center; gap: 14px; margin-bottom: 18px;
  padding: 14px 18px; border-radius: 16px;
  background: linear-gradient(180deg, var(--panel-grad-a), var(--panel-grad-b));
  border: 1px solid var(--stroke); border-left: 4px solid var(--accent);
  backdrop-filter: blur(12px); box-shadow: var(--shadow);
  animation: fadeIn 0.5s ease both;
}
.activity-hint.hidden { display: none; }
.ah-icon { font-size: 1.8rem; line-height: 1; flex: 0 0 auto;
  animation: bob 2.4s ease-in-out infinite; }
.ah-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.ah-text b { font-size: 1rem; font-weight: 700; line-height: 1.25; }
.ah-sub { color: var(--muted); font-weight: 500; font-size: 0.86rem; line-height: 1.4; }
/* Tone accents (left border + a faint matching wash) */
.activity-hint.ah-good { border-left-color: #7ed957; }
.activity-hint.ah-wet  { border-left-color: #5fa8ff; }
.activity-hint.ah-bad  { border-left-color: #ff6b6b; }
.activity-hint.ah-hot  { border-left-color: #ffa62b; }
.activity-hint.ah-cool { border-left-color: #8fd3ff; }
.activity-hint.ah-neutral { border-left-color: var(--faint); }
/* Radar header controls --------------------------------------------------- */
.radar-head-right { display: flex; align-items: center; gap: 12px; }
.radar-mode button { padding: 7px 12px; font-size: 0.82rem; }
.radar-mode.disabled { opacity: 0.4; pointer-events: none; }
/* Historical reference ---------------------------------------------------- */
.history-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(132px, 1fr));
  gap: 12px; margin-bottom: 16px; align-items: start; }
.hstat { background: var(--panel-2); border: 1px solid var(--stroke);
  border-radius: 14px; padding: 12px 14px; }
.hstat .k { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--faint); }
.hstat .v { font-size: 1.5rem; font-weight: 700; line-height: 1.1; margin-top: 2px; }
.hstat .x { font-size: 0.8rem; color: var(--muted); }
.hstat.delta-warm .v { color: #ff8a5f; }
.hstat.delta-cool .v { color: #6fb7ff; }
.history-chart { height: 200px; margin-top: 4px; }
.history-note { font-size: 0.76rem; color: var(--faint); margin-top: 10px; line-height: 1.5; }
/* Radar time-lapse -------------------------------------------------------- */
.radar-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
.radar-head h2 { margin: 0; }
.radar-frame-label {
  font-variant-numeric: tabular-nums; font-weight: 700; font-size: 0.95rem;
  color: var(--text); background: var(--glass); padding: 5px 12px; border-radius: 10px;
  border: 1px solid var(--stroke);
}
.radar-frame-label.is-forecast { color: #ffd45e; border-color: rgba(255,212,94,0.4); }
.radar-map-wrap {
  position: relative; width: 100%; height: clamp(260px, 34vh, 360px);
  border-radius: 16px; overflow: hidden; border: 1px solid var(--stroke);
  background: #0b1020;
}
#radarMap { position: absolute; inset: 0; height: 100%; width: 100%; background: #0b1020; }
.radar-loading {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: rgba(11,16,32,0.6); z-index: 500; backdrop-filter: blur(2px);
}
.radar-loading.hidden { display: none; }
.radar-legend {
  position: absolute; right: 12px; bottom: 12px; z-index: 500;
  display: flex; align-items: center; gap: 8px; font-size: 0.72rem; color: var(--muted);
  background: rgba(11,16,32,0.7); padding: 6px 10px; border-radius: 10px; border: 1px solid var(--stroke);
}
.radar-gradient { display: inline-block; width: 90px; height: 8px; border-radius: 4px;
  background: linear-gradient(90deg, #1fd0a3, #7ed957, #ffd45e, #ff8a3d, #ff4d4d, #c44dff); }
.radar-controls { display: flex; align-items: center; gap: 14px; margin-top: 14px; }
.radar-play { font-size: 1rem; width: 46px; justify-content: center; }
.radar-speed .btn { min-width: 46px; justify-content: center; }
.radar-scrub { flex: 1; -webkit-appearance: none; appearance: none; height: 6px; border-radius: 4px;
  background: linear-gradient(90deg, rgba(111,183,255,0.5), rgba(255,212,94,0.5)); outline: none; cursor: pointer; }
.radar-scrub::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
  background: #fff; border: 3px solid var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.4); cursor: pointer; }
.radar-scrub::-moz-range-thumb { width: 16px; height: 16px; border-radius: 50%; background: #fff; border: 3px solid var(--accent); cursor: pointer; }
/* Crossfade between radar frames */
.leaflet-tile-pane .leaflet-layer { transition: opacity 0.35s ease; }
.radar-tiles { image-rendering: -webkit-optimize-contrast; }
/* Pulsing location pin */
.radar-pin { position: relative; }
.radar-pin .pin-dot { position: absolute; left: 5px; top: 5px; width: 9px; height: 9px; border-radius: 50%;
  background: #6fb7ff; box-shadow: 0 0 0 2px #fff, 0 2px 6px rgba(0,0,0,0.5); }
.radar-pin .pin-pulse { position: absolute; left: 0; top: 0; width: 18px; height: 18px; border-radius: 50%;
  background: rgba(111,183,255,0.45); animation: pinpulse 2s ease-out infinite; }
@keyframes pinpulse { 0% { transform: scale(0.5); opacity: 0.8; } 100% { transform: scale(2.6); opacity: 0; } }
/* Dark Leaflet chrome */
.leaflet-bar a, .leaflet-bar a:hover { background: rgba(20,28,48,0.9); color: var(--text); border-color: var(--stroke); }
.leaflet-control-attribution { background: rgba(11,16,32,0.7) !important; color: var(--faint) !important; font-size: 0.66rem; }
.leaflet-control-attribution a { color: var(--muted) !important; }
/* Rain overlay (subtle, for rainy/stormy themes) -------------------------- */
.rain-fx { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0; transition: opacity 1s; overflow: hidden; }
.rain-fx.on { opacity: 0.5; }
.rain-fx i { position: absolute; top: -10%; width: 1px; height: 60px; background: linear-gradient(transparent, rgba(180,200,255,0.5)); animation: drop linear infinite; }
@keyframes drop { to { transform: translateY(120vh); } }
/* ============================================================
   New features: story, vs-yesterday, inline precip, live favs, settings
   ============================================================ */
/* Today story + vs-yesterday/tip (hero) */
.daystory { font-size: 0.9rem; color: var(--muted); line-height: 1.5; margin-top: 12px;
  padding-top: 12px; border-top: 1px solid var(--stroke); }
.vsy { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-top: 8px; }
.vsy-d { font-size: 0.86rem; color: var(--text); font-weight: 600; }
.vsy-tip { font-size: 0.8rem; font-weight: 600; color: var(--amber);
  background: rgba(255,166,43,0.12); border: 1px solid rgba(255,166,43,0.3);
  padding: 3px 10px; border-radius: 999px; }
/* Inline 7-day precip-probability bar */
.day .dprecip { grid-column: 1 / -1; display: flex; gap: 1px; height: 5px; margin-top: 4px;
  border-radius: 3px; overflow: hidden; background: var(--panel-2); }
.day .dprecip i { flex: 1; background: #5fa8ff; opacity: var(--a, 0); }
.dd-story { font-weight: 600; color: var(--text); margin: 0 0 8px; font-size: 0.9rem; }
/* Live favorite chips */
.fav-chip { user-select: none; }
.fav-chip.dragging { opacity: 0.5; }
.fav-ico { display: inline-flex; }
.fav-ico .wxicon { width: 20px; height: 20px; }
.fav-temp { font-weight: 700; color: var(--text); }
.fav-chip .fav-name { font-weight: 500; }
/* Lifestyle / activity indices */
.life-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
.life { background: var(--panel-2); border: 1px solid var(--stroke); border-radius: 14px; padding: 12px 13px; }
.life-top { display: flex; align-items: center; justify-content: space-between; }
.life-emoji { font-size: 1.4rem; }
.life-score { font-size: 1.5rem; font-weight: 800; line-height: 1; }
.life-name { font-weight: 700; margin-top: 4px; }
.life-name .life-sub { font-weight: 500; color: var(--faint); font-size: 0.72rem; margin-left: 6px; }
.life-bar { height: 5px; border-radius: 3px; background: rgba(255,255,255,0.1); overflow: hidden; margin: 8px 0 6px; }
.life-bar i { display: block; height: 100%; border-radius: 3px; }
.life-reason { font-size: 0.74rem; color: var(--muted); }
/* Customizable layout (hide + reorder cards) ------------------------------ */
.lay-hidden { display: none; }
.card-edit { display: none; }
body.editing-layout .card-edit {
  display: flex; align-items: center; gap: 8px; margin: -2px 0 14px;
  padding: 8px 10px; border-radius: 10px;
  background: rgba(111,183,255,0.14); border: 1px dashed rgba(111,183,255,0.55);
}
body.editing-layout section[data-card] { outline: 1px dashed rgba(111,183,255,0.30); outline-offset: 3px; }
body.editing-layout .lay-hidden { display: block; }      /* reveal hidden cards so they can be restored */
body.editing-layout section[data-card].lay-dim { opacity: 0.5; }
.ce-grip { cursor: grab; color: var(--muted); font-size: 1.15rem; line-height: 1; touch-action: none; }
.ce-grip:active { cursor: grabbing; }
.ce-name { font-weight: 700; font-size: 0.82rem; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ce-btn { padding: 4px 10px; border-radius: 8px; border: 1px solid var(--stroke); background: var(--glass); color: var(--text); cursor: pointer; font-size: 0.78rem; }
.ce-btn:hover { background: var(--glass-strong); }
.ce-hide { min-width: 52px; }
section[data-card].dragging { opacity: 0.55; }
/* 2D corner resize handle — horizontal drag = width (column span),
   vertical drag = fixed height. */
.card-resize { display: none; }
body.editing-layout .card-resize {
  display: block; position: absolute; right: 4px; bottom: 4px; width: 24px; height: 24px;
  z-index: 6; cursor: nwse-resize; touch-action: none; border-radius: 0 0 14px 0;
  background:
    linear-gradient(135deg, transparent 0 38%, var(--accent) 38% 52%, transparent 52% 64%, var(--accent) 64% 78%, transparent 78% 88%, var(--accent) 88% 100%);
  opacity: 0.7;
}
body.editing-layout .card-resize:hover { opacity: 1; }
.card-resize-label {
  position: absolute; right: 8px; bottom: 32px; z-index: 7; pointer-events: none; white-space: nowrap;
  font-size: 0.72rem; font-weight: 800; color: var(--accent);
  background: rgba(20,28,48,0.92); border: 1px solid var(--stroke);
  border-radius: 7px; padding: 2px 7px;
}
/* Phones are single-column: width spans AND height overrides are ignored so the
   mobile layout stays full-width and content-driven; hide the handle too. */
@media (max-width: 980px) {
  body.editing-layout .card-resize { display: none; }
  #content > section.lay-sized { height: auto !important; overflow: visible !important; }
}
.layout-bar {
  position: fixed; left: 50%; bottom: 0; z-index: 1200;
  transform: translateX(-50%) translateY(130%); transition: transform 0.3s ease;
  display: flex; align-items: center; gap: 12px; max-width: 94vw;
  padding: 12px 16px; padding-bottom: calc(12px + env(safe-area-inset-bottom));
  border-radius: 16px 16px 0 0; background: rgba(20,28,48,0.97);
  border: 1px solid var(--stroke); box-shadow: var(--shadow); backdrop-filter: blur(12px);
}
.layout-bar.show { transform: translateX(-50%) translateY(0); }
.layout-bar .lb-hint { font-size: 0.78rem; color: var(--muted); }
.layout-bar .lb-hint b { color: var(--text); }
.layout-bar .lb-done { background: var(--accent); color: #06203f; font-weight: 700; }
@media (max-width: 520px) { .layout-bar .lb-hint { display: none; } }
.reduce-motion .layout-bar { transition: none; }
/* Prayer times card ------------------------------------------------------- */
.pray-head { display: flex; align-items: center; gap: 8px; justify-content: space-between; margin-bottom: 14px; }
.pray-title { display: flex; align-items: center; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 1.4px; color: var(--muted); font-weight: 700; }

// Corner handle to resize a card in 2 dimensions: horizontal drag snaps the
// column span to the grid (width); vertical drag sets a fixed pixel height.
// An axis only becomes an override if the user actually drags it, so height
// stays content-driven (no dead space) until deliberately changed.
function attachResize(section, key) {
  const handle = document.createElement(&quot;div&quot;);
  handle.className = &quot;card-resize&quot;;
  handle.title = &quot;Drag to resize (width ↔, height ↕)&quot;;
  section.appendChild(handle);
  let startX = 0, startY = 0, startC = 0, startH = 0, liveC = 0, liveH = 0, label = null;
  const onMove = (e) => {
    liveC = Math.max(MIN_SPAN, Math.min(GRID_COLS,
      Math.round(startC + (e.clientX - startX) / gridColumnUnit())));
    liveH = Math.max(MIN_H, Math.min(MAX_H, startH + (e.clientY - startY)));
    section.style.gridColumn = `span ${liveC}`;
    section.style.height = liveH + &quot;px&quot;;
    section.style.overflow = &quot;auto&quot;;
    if (label) label.textContent = `${liveC}/${GRID_COLS} · ${Math.round(liveH)}px`;
  };
  const onUp = (e) => {
    document.removeEventListener(&quot;pointermove&quot;, onMove);
    document.removeEventListener(&quot;pointerup&quot;, onUp);
    label?.remove(); label = null;
    const cfg = cardCfg(key);
    // Only persist an axis the user meaningfully dragged.
    const draggedX = Math.abs(e.clientX - startX) > gridColumnUnit() / 2;
    const draggedY = Math.abs(e.clientY - startY) > 16;
    setCardCfg(key, {
      c: draggedX ? liveC : (cfg.c ?? null),
      h: draggedY ? Math.round(liveH) : (cfg.h ?? null),
    });

    window.dispatchEvent(new Event(&quot;resize&quot;));   // reflow Chart.js canvases + Leaflet map
  };
  handle.addEventListener(&quot;pointerdown&quot;, (e) => {
    e.preventDefault(); e.stopPropagation();
    startX = e.clientX; startY = e.clientY;
    startC = liveC = currentSpan(section);
    startH = liveH = Math.round(section.getBoundingClientRect().height);
    label = document.createElement(&quot;div&quot;);
    label.className = &quot;card-resize-label&quot;;
    label.textContent = `${startC}/${GRID_COLS} · ${startH}px`;
    section.appendChild(label);

    document.addEventListener(&quot;pointerup&quot;, onUp);
  });
}

// Postal-code lookup via zippopotam.us (free, CORS-enabled). Tries the current
// country first, then a few common ones.
async function zipSearch(zip) {
  const z = zip.replace(/\s/g, &quot;&quot;);
  const ccs = [];
  if (state.place &amp;&amp; state.place.country_code) ccs.push(state.place.country_code.toLowerCase());
  [&quot;us&quot;, &quot;gb&quot;, &quot;ca&quot;, &quot;de&quot;, &quot;fr&quot;, &quot;au&quot;].forEach((c) => { if (!ccs.includes(c)) ccs.push(c); });
  for (const cc of ccs.slice(0, 3)) {
    try {
      const r = await fetch(`https://api.zippopotam.us/${cc}/${encodeURIComponent(z)}`);
      if (!r.ok) continue;
      const d = await r.json();
      if (d.places &amp;&amp; d.places.length) {
        return d.places.slice(0, 5).map((p) => ({
          name: `${p[&quot;place name&quot;]}${p.state ? &quot;, &quot; + (p[&quot;state abbreviation&quot;] || p.state) : &quot;&quot;}`,
          admin1: p.state, country: d.country, country_code: (d[&quot;country abbreviation&quot;] || cc).toUpperCase(),
          lat: +p.latitude, lon: +p.longitude,
        }));

  }

}

function useMyLocation() {
  // Browsers block geolocation on insecure (plain http, non-localhost) origins —
  // e.g. when viewing over the LAN on a phone. The installed PWA is served over
  // HTTPS (GitHub Pages), so this guard only trips on the dev box over the LAN.
  if (!window.isSecureContext &amp;&amp; location.hostname !== &quot;localhost&quot; &amp;&amp; location.hostname !== &quot;127.0.0.1&quot;) {
    toast(&quot;Location needs HTTPS — search your city instead&quot;, 3200);
    $(&quot;searchInput&quot;).focus();
    $(&quot;searchInput&quot;).placeholder = &quot;Search your city ↵&quot;;
    return;
  }
  if (!navigator.geolocation) { toast(&quot;This device can't share its location&quot;); return; }
  const btn = $(&quot;geoBtn&quot;);
  btn?.classList.add(&quot;locating&quot;);
  toast(&quot;Finding your location…&quot;, 15000);
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      btn?.classList.remove(&quot;locating&quot;);
      const { latitude: lat, longitude: lon } = pos.coords;
      let info = {};
      try {
        const r = await fetch(`/api/reverse?lat=${lat}&amp;lon=${lon}&amp;lang=${effLang2()}`);
        info = await r.json();
      } catch (e) { /* name is optional — fall back to &quot;My location&quot; */ }
      loadWeather({
        name: info.name || &quot;My location&quot;, admin1: info.admin1,
        country: info.country, country_code: info.country_code, lat, lon,
      });
    },
    (err) => {
      // Don't silently strand the user — say what happened so the pin feels alive.
      btn?.classList.remove(&quot;locating&quot;);
      const msg = err.code === err.PERMISSION_DENIED
        ? &quot;Location blocked — allow it in your device settings, or search your city&quot;
        : err.code === err.TIMEOUT
        ? &quot;Couldn't get a location fix in time — try again&quot;
        : &quot;Location unavailable — search your city instead&quot;;
      toast(msg, 3600);
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 60000 }
  );
}

}

  if (pop >= 60) return &quot;☔ Take an umbrella&quot;;
  const cold = imp ? 38 : 3, cool = imp ? 56 : 13, warm = imp ? 86 : 30;

// --- Nowcast banner (next ~2h precipitation) ------------------------------
function renderNowcast(f) {
  const box = $(&quot;nowcast&quot;);
  const m = f.minutely_15;
  if (!m || !m.precipitation || !m.time) { box.classList.add(&quot;hidden&quot;); return; }
  const now = Date.now();
  let i0 = m.time.findIndex((t) => new Date(t).getTime() >= now);
  if (i0 < 0) { box.classList.add(&quot;hidden&quot;); return; }
  const thr = state.units === &quot;imperial&quot; ? 0.004 : 0.1; // ~trace, per step
  const horizon = 8; // 8 × 15min = 2h
  const steps = [];
  for (let i = i0; i < Math.min(m.time.length, i0 + horizon + 1); i++) {
    steps.push({ t: new Date(m.time[i]).getTime(), p: m.precipitation[i] });
  }
  const wet = (p) => p != null &amp;&amp; p > thr;
  const nowWet = wet(steps[0].p);
  let trans = null;
  for (let k = 1; k < steps.length; k++) {
    if (wet(steps[k].p) !== nowWet) { trans = steps[k]; break; }
  }
  const mins = (t) => Math.max(0, Math.round((t - now) / 60000 / 5) * 5);
  const peak = Math.max(...steps.map((s) => s.p || 0));
  const intensity = peak > (state.units === &quot;imperial&quot; ? 0.1 : 2.5) ? &quot;heavy&quot;
    : peak > (state.units === &quot;imperial&quot; ? 0.02 : 0.5) ? &quot;moderate&quot; : &quot;light&quot;;
  let icon = &quot;🌦️&quot;, cls = &quot;nowcast&quot;, title = &quot;&quot;, sub = &quot;&quot;;
  if (nowWet &amp;&amp; trans) {
    icon = &quot;🌧️&quot;; const mm = mins(trans.t);
    title = mm <= 5 ? &quot;Rain stopping shortly&quot; : `Rain easing in ~${mm} min`;
    sub = &quot;Then dry for a while.&quot;;
  } else if (nowWet &amp;&amp; !trans) {
    icon = &quot;🌧️&quot;; title = `${intensity[0].toUpperCase() + intensity.slice(1)} rain continuing`;
    sub = &quot;Expected to keep up over the next 2 hours.&quot;;
  } else if (!nowWet &amp;&amp; trans) {
    icon = &quot;🌦️&quot;; const mm = mins(trans.t);
    title = mm <= 5 ? &quot;Rain starting any minute&quot; : `Rain starting in ~${mm} min`;
    sub = `${intensity[0].toUpperCase() + intensity.slice(1)} precipitation moving in.`;
  } else {
    icon = &quot;☀️&quot;; cls = &quot;nowcast dry&quot;; title = &quot;No rain in the next 2 hours&quot;;
    sub = &quot;Skies look clear of precipitation for now.&quot;;
  }
  box.className = cls;
  box.innerHTML = `<div class=&quot;nc-main&quot;><span class=&quot;nc-icon&quot;>${icon}</span>` +
    `<span>${title}<br><span class=&quot;nc-sub&quot;>${sub}</span></span></div>` +
    minutecastGraph(steps, thr);
}
// Minutecast: a small bar chart of precipitation over the next ~2 hours
// (Open-Meteo 15-min data). Only shown when precip is actually in the window.
function minutecastGraph(steps, thr) {
  if (!steps || steps.length < 2) return &quot;&quot;;
  const peak = Math.max(...steps.map((s) => s.p || 0));
  if (peak <= thr) return &quot;&quot;; // dry — the banner already says &quot;all clear&quot;
  const imp = state.units === &quot;imperial&quot;;
  const W = 300, H = 48, base = H - 12, pad = 3;
  const n = steps.length, bw = (W - pad * 2) / n;
  const scale = Math.max(peak, thr * 5);
  const heavy = imp ? 0.1 : 2.5, moderate = imp ? 0.02 : 0.5;
  const bars = steps.map((s, k) => {
    const p = s.p || 0;
    const h = p > thr ? Math.max(2.5, (p / scale) * base) : 0;
    const x = pad + k * bw;
    const col = p > heavy ? &quot;#ff6b6b&quot; : p > moderate ? &quot;#ffd45e&quot; : &quot;#5fa8ff&quot;;
    return `<rect x=&quot;${(x + 1).toFixed(1)}&quot; y=&quot;${(base - h).toFixed(1)}&quot; width=&quot;${Math.max(1, bw - 2).toFixed(1)}&quot; height=&quot;${h.toFixed(1)}&quot; rx=&quot;2&quot; fill=&quot;${col}&quot;><title>${clk(new Date(s.t))} · ${r1(p)} ${precU()}</title></rect>`;
  }).join(&quot;&quot;);
  return `<div class=&quot;nc-graph&quot;>
    <svg viewBox=&quot;0 0 ${W} ${H}&quot; preserveAspectRatio=&quot;none&quot; role=&quot;img&quot; aria-label=&quot;Precipitation, next 2 hours&quot;>
      <line x1=&quot;${pad}&quot; y1=&quot;${base}&quot; x2=&quot;${W - pad}&quot; y2=&quot;${base}&quot; stroke=&quot;rgba(255,255,255,0.18)&quot; stroke-width=&quot;1&quot;/>
      ${bars}
    </svg>
    <div class=&quot;nc-graph-x&quot;><span>Now</span><span>+1h</span><span>+2h</span></div>
  </div>`;
}
// --- Activity outlook (plain-language hint for the next few hours) ---------
// A single, human-readable &quot;what should I do&quot; read derived from the hourly
// forecast window — e.g. &quot;Rain likely around 3 PM — a good window for indoor
// plans&quot; or &quot;Clear and mild for the next few hours — perfect for a walk.&quot;
// Surfaced as a prominent banner (most useful on mobile, where the index grid
// is far down the page).
const WMO_WET = (c) => (c >= 51 &amp;&amp; c <= 67) || (c >= 80 &amp;&amp; c <= 82);
const WMO_SNOW = (c) => (c >= 71 &amp;&amp; c <= 77) || c === 85 || c === 86;
const WMO_STORM = (c) => c >= 95;
function renderActivityHint(f) {
  const box = $(&quot;activityHint&quot;);
  if (!box) return;
  const h = f.hourly;
  if (!h || !h.time || !h.time.length) { box.classList.add(&quot;hidden&quot;); return; }
  const now = Date.now();
  let i0 = h.time.findIndex((t) => new Date(t).getTime() >= now - 30 * 60000);
  if (i0 < 0) i0 = 0;
  const HORIZON = 6; // hours ahead to characterize
  const wmul = WIND_TO_MS[fetchedWind()] || WIND_TO_MS.mph;
  const win = [];
  for (let i = i0; i < Math.min(h.time.length, i0 + HORIZON); i++) {
    win.push({
      t: new Date(h.time[i]).getTime(),
      pop: h.precipitation_probability ? (h.precipitation_probability[i] || 0) : 0,
      precip: h.precipitation ? (h.precipitation[i] || 0) : 0,
      code: h.weather_code ? h.weather_code[i] : 0,
      feels: h.apparent_temperature ? h.apparent_temperature[i]
        : (h.temperature_2m ? h.temperature_2m[i] : null),
      uv: h.uv_index ? (h.uv_index[i] || 0) : 0,
      wind: (h.wind_speed_10m ? (h.wind_speed_10m[i] || 0) : 0) * wmul,
      day: h.is_day ? h.is_day[i] === 1 : true,
    });
  }
  if (!win.length) { box.classList.add(&quot;hidden&quot;); return; }
  const out = activityOutlook(win, state.units === &quot;imperial&quot;);
  box.className = `activity-hint ${out.tone}`;
  box.innerHTML = `<span class=&quot;ah-icon&quot; aria-hidden=&quot;true&quot;>${out.emoji}</span>` +
    `<span class=&quot;ah-text&quot;><b>${out.title}</b>` +
    (out.detail ? `<span class=&quot;ah-sub&quot;>${out.detail}</span>` : &quot;&quot;) + `</span>`;
}
// Pure decision cascade: given a window of hourly samples (and the unit system)
// return { emoji, title, detail, tone }. Ordered most-actionable first.
function activityOutlook(win, imp) {
  const at = (t) => clk(new Date(t), false);
  const wetTrace = imp ? 0.004 : 0.1;               // ~trace precip, per hour
  const hotT = imp ? 90 : 32, coldT = imp ? 36 : 2; // feels-like thresholds
  const windHi = 9, uvHi = 6;                       // m/s (~20 mph), UV index
  const isWet = (s) => WMO_WET(s.code) || WMO_SNOW(s.code) || WMO_STORM(s.code)
    || s.pop >= 55 || s.precip > wetTrace;
  const firstWet = win.find(isWet);
  const nowWet = isWet(win[0]);
  let run = 0; while (run < win.length &amp;&amp; isWet(win[run])) run++;  // wet hours from now
  const clearsWithin = nowWet &amp;&amp; run < win.length;
  const stormy = win.some((s) => WMO_STORM(s.code));
  const snowy = win.some((s) => WMO_SNOW(s.code)
    || (s.precip > wetTrace &amp;&amp; s.feels != null &amp;&amp; s.feels <= (imp ? 34 : 1)));
  const maxPop = Math.max(...win.map((s) => s.pop));
  const maxUV = Math.max(...win.map((s) => s.uv));
  const maxWind = Math.max(...win.map((s) => s.wind));
  const feelsVals = win.map((s) => s.feels).filter((v) => v != null);
  const feelsMax = feelsVals.length ? Math.max(...feelsVals) : null;
  const dayMost = win.filter((s) => s.day).length >= win.length / 2;
  const hrs = (n) => `${n} ${n === 1 ? &quot;hour&quot; : &quot;hours&quot;}`;
  // 1) Thunderstorms — strongest signal, keep people in.
  if (stormy) {
    const s = win.find((x) => WMO_STORM(x.code));
    return { emoji: &quot;⛈️&quot;, tone: &quot;ah-bad&quot;,
      title: `Thunderstorms ${nowWet ? &quot;right now&quot; : `likely around ${at(s.t)}`} — keep plans indoors`,
      detail: &quot;Best to hold off on anything outdoors until the storms pass.&quot; };
  }
  // 2) Snow
  if (snowy) {
    const s = win.find((x) => WMO_SNOW(x.code)) || firstWet;
    return { emoji: &quot;🌨️&quot;, tone: &quot;ah-cool&quot;,
      title: nowWet ? &quot;Snow falling — a cozy day for indoor plans&quot;
                    : `Snow likely around ${at(s.t)}`,
      detail: &quot;Roads may be slick; bundle up well if you head out.&quot; };
  }
  // 3) Raining now
  if (nowWet) {
    if (clearsWithin) {
      return { emoji: &quot;🌧️&quot;, tone: &quot;ah-wet&quot;,
        title: `Wet now, easing around ${at(win[run].t)}`,
        detail: &quot;Good window for indoor activities — it opens up for outdoor plans after that.&quot; };
    }
    return { emoji: &quot;🌧️&quot;, tone: &quot;ah-wet&quot;,
      title: `Wet for the next ${hrs(run)}`,
      detail: &quot;A good stretch for indoor plans — errands, a café, or a workout inside.&quot; };
  }
  // 4) Dry now, rain coming later in the window
  if (firstWet) {
    return { emoji: &quot;🌦️&quot;, tone: &quot;ah-wet&quot;,
      title: `Dry for now — rain likely around ${at(firstWet.t)}`,
      detail: &quot;Get outdoor plans in early, then keep an indoor backup ready.&quot; };
  }
  if (maxPop >= 35) {
    return { emoji: &quot;🌥️&quot;, tone: &quot;ah-neutral&quot;,
      title: &quot;Mostly dry, with a chance of showers&quot;,
      detail: &quot;Outdoor plans should be fine — maybe pack a backup just in case.&quot; };
  }
  // 5) Dry window — characterize comfort.
  if (feelsMax != null &amp;&amp; feelsMax >= hotT &amp;&amp; maxUV >= uvHi) {
    return { emoji: &quot;🥵&quot;, tone: &quot;ah-hot&quot;,
      title: &quot;Hot with strong sun for the next few hours&quot;,
      detail: &quot;Head out early or toward evening, hydrate, and wear sunscreen.&quot; };
  }
  if (feelsMax != null &amp;&amp; feelsMax <= coldT) {
    return { emoji: &quot;🧥&quot;, tone: &quot;ah-cool&quot;,
      title: &quot;Cold for the next few hours&quot;,
      detail: &quot;Bundle up well for anything outdoors — or keep it indoors.&quot; };
  }
  if (maxWind >= windHi) {
    return { emoji: &quot;🌬️&quot;, tone: &quot;ah-neutral&quot;,
      title: &quot;Breezy for a while&quot;,
      detail: &quot;Fine for a brisk walk; less ideal for cycling, the beach, or umbrellas.&quot; };
  }
  if (!dayMost) {
    return { emoji: &quot;🌙&quot;, tone: &quot;ah-good&quot;,
      title: &quot;Clear and calm this evening&quot;,
      detail: `Nice for a stroll${maxUV < 1 ? &quot; or a bit of stargazing.&quot; : &quot;.&quot;}` };
  }
  // Pleasant daytime
  return { emoji: &quot;😎&quot;, tone: &quot;ah-good&quot;,
    title: &quot;Great few hours for outdoor plans&quot;,
    detail: &quot;Comfortable and dry — perfect for a walk, a run, or time outside.&quot;
      + (maxUV >= uvHi ? &quot; Grab sunscreen if you'll be out a while.&quot; : &quot;&quot;) };
}

// --- Favorites (saved locations) ------------------------------------------
const placeKey = (p) => `${p.lat.toFixed(2)},${p.lon.toFixed(2)}`;
function isFavorite(p) {

}
function toggleFavorite() {
  if (!state.place) return;

    state.favorites = state.favorites.filter((q) => placeKey(q) !== k);

    state.favorites.push({

// Cache of each favorite's current conditions (so chips can show live temps

const favCache = new Map();
async function favData(p) {

    const r = await fetch(`/api/weather?lat=${p.lat}&amp;lon=${p.lon}&amp;units=${state.units}&amp;compact=1`);
    const d = await r.json();
    const cur = (d.forecast &amp;&amp; d.forecast.current) || {};
    const v = { t: Date.now(), temp: cur.temperature_2m, code: cur.weather_code, day: cur.is_day != null ? cur.is_day : 1 };

}
function renderFavorites() {

    const on = state.place &amp;&amp; isFavorite(state.place);

    star.classList.toggle(&quot;active&quot;, !!on);
    star.title = on ? &quot;Remove from favorites&quot; : &quot;Save this location&quot;;
  }
  bar.innerHTML = state.favorites.map((p, i) => {
    const active = state.place &amp;&amp; placeKey(p) === placeKey(state.place);
    return `<button class=&quot;fav-chip ${active ? &quot;active&quot; : &quot;&quot;}&quot; data-i=&quot;${i}&quot; draggable=&quot;true&quot;>` +
      `<span class=&quot;fav-ico&quot;></span><span class=&quot;fav-name&quot;>${p.name}</span>` +

    b.addEventListener(&quot;dragend&quot;, () => b.classList.remove(&quot;dragging&quot;));

      const arr = state.favorites;

// --- Desktop notifications ------------------------------------------------
let lastNotified = &quot;&quot;;
function setupNotifications() {
  const btn = $(&quot;notifyBtn&quot;);
  if (!btn) return;
  const sync = () => {
    const granted = &quot;Notification&quot; in window &amp;&amp; Notification.permission === &quot;granted&quot;;
    btn.textContent = granted ? &quot;🔔 Alerts on&quot; : &quot;🔕 Alerts&quot;;
    btn.classList.toggle(&quot;active&quot;, granted);
  };
  btn.onclick = async () => {
    if (!(&quot;Notification&quot; in window)) { alert(&quot;This browser doesn't support notifications.&quot;); return; }
    if (Notification.permission !== &quot;granted&quot;) await Notification.requestPermission();
    sync();
  };
  sync();
}
function maybeNotify(place, f, alerts) {
  if (!(&quot;Notification&quot; in window) || Notification.permission !== &quot;granted&quot;) return;
  const fire = (title, body, tag) => {
    if (lastNotified === tag) return;
    lastNotified = tag;
    try { new Notification(title, { body, tag }); } catch (e) {}
  };
  // Severe-weather alert.
  if (alerts &amp;&amp; alerts.length) {
    fire(`⚠ ${alerts[0].event} — ${place.name}`, alerts[0].headline || &quot;&quot;, &quot;alert:&quot; + (alerts[0].event || &quot;&quot;) + place.name);
    return;
  }
  // Imminent rain from the 15-min nowcast.
  const m = f.minutely_15;
  if (m &amp;&amp; m.precipitation) {
    const now = Date.now();
    let i0 = m.time.findIndex((t) => new Date(t).getTime() >= now);
    if (i0 >= 0) {
      const thr = state.units === &quot;imperial&quot; ? 0.004 : 0.1;
      const dryNow = !(m.precipitation[i0] > thr);
      for (let k = i0; k < Math.min(m.time.length, i0 + 8); k++) {
        if (dryNow &amp;&amp; m.precipitation[k] > thr) {
          const mins = Math.round((new Date(m.time[k]).getTime() - now) / 60000);
          fire(`🌧️ Rain soon — ${place.name}`, `Precipitation starting in about ${mins} min.`, `rain:${place.name}:${m.time[k]}`);
          break;
        }
      }
    }
  }
}

// Brief, self-dismissing status message (reuses the &quot;Updated&quot; pill).
function toast(msg, ms = 2600) {

  t.textContent = msg;
  t.classList.add(&quot;show&quot;);
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove(&quot;show&quot;), ms);
}

}
function scheduleRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(() => { if (state.place &amp;&amp; !document.hidden) loadWeather(state.place, true); }, 10 * 60 * 1000);
}
// Manual refresh button. Works identically on the web and in the installed PWA
// (which has no browser reload). Silently re-pulls the current location so the
// last-good data stays on screen if the refresh fails, spins the icon for
// feedback, shows the &quot;Updated&quot; toast, and resets the auto-refresh timer.
let refreshing = false;
async function doRefresh() {
  if (refreshing || !state.place) return;
  refreshing = true;
  const btn = $(&quot;refreshBtn&quot;);
  btn?.classList.add(&quot;spinning&quot;);
  favCache.clear();                       // re-pull favorite-chip temps too
  try {
    await loadWeather(state.place, true);
    scheduleRefresh();                    // next auto-refresh is a full interval away
  } finally {
    refreshing = false;
    btn?.classList.remove(&quot;spinning&quot;);
  }
